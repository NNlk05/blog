<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title }} | {{ site.title }}</title>

    <link
      rel="stylesheet"
      href="https://flackr.github.io/scroll-timeline/dist/scroll-timeline.js"
    />
    <script
      src="https://flackr.github.io/scroll-timeline/dist/scroll-timeline.js"
      defer
    ></script>

    <link
      rel="stylesheet"
      href="{{ '/assets/css/style.css' | relative_url }}"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&family=Noto+Emoji:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="https://nnlk05.github.io/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="https://nnlk05.github.io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="https://nnlk05.github.io/favicon-16x16.png"
    />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="https://nnlk05.github.io/">Home</a></li>
          <li><a href="https://nnlk05.github.io/about.html">About</a></li>
          <li><a href="https://nnlk05.github.io/contact.html">Contact</a></li>
          <li><a href="https://nnlk05.github.io/projects.html">Projects</a></li>
          <li>
            <a href="https://nnlk05.github.io/nnlks_junk/index.html">My Junk</a>
          </li>
          <li>
            <a href="https://nnlk05.github.io/games/index.html">My Games</a>
          </li>
          <li><a href="https://nnlk05.github.io/blog">Blog</a></li>
        </ul>
      </nav>
      <img
        src="https://nnlk05.github.io/pack.png"
        alt="NNlk05's pfp"
        draggable="false"
        width="1920"
        height="1080"
      />
      <div class="header-content">
        <h1>{{ page.title }}</h1>
        <h2>{{ site.description }}</h2>
      </div>
      <button
        onclick="
          document
            .querySelector('.scroll-to-here')
            .scrollIntoView({ behavior: 'smooth' })
        "
      >
        V
      </button>
    </header>
    <main>
      <span
        class="scroll-to-here"
        style="
          display: block;
          position: relative;
          top: -100px;
          visibility: hidden;
        "
      ></span>

      <div class="container">{{ content }}</div>
    </main>
  </body>
</html>
